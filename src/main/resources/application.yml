spring:
  application:
    name: card-transaction-authorizer
  data:
    mongodb:
      # Credentials MUST be provided via environment variables.
      # Local defaults are provided only for development convenience.
      uri: ${MONGO_URI:mongodb://user:password@localhost:27017/miniautorizador}

# ---- Actuator & Observability (Spec 05) ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms

# ---- Resilience4j — Circuit Breaker (Spec 10) ----
resilience4j:
  circuitbreaker:
    instances:
      mongoCircuitBreaker:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2s
  retry:
    instances:
      mongoRetry:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.dao.TransientDataAccessException

# ---- OpenAPI / Swagger (Spec 13) ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ---- Logging (Spec 05) ----
logging:
  level:
    com.caju: INFO
    org.springframework: WARN
